name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build .exe
        run: pyinstaller --onefile --name "sim4debug-${{ github.ref_name }}" --console mod_analyzer.py

      - name: Upload .exe to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/sim4debug-${{ github.ref_name }}.exe
          asset_name: sim4debug-${{ github.ref_name }}-windows-x64.exe
          tag: ${{ github.ref_name }}
          overwrite: true
